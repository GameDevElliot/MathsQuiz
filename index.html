<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
    <title>Angle Game</title>
    <style>
        :root {
            --bottom-clearance: max(18px, env(safe-area-inset-bottom, 0px));
            --choice-area-min-height: 150px;
        }

        html, body {
            height: 100%;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #e2e8f0;
            color: #111;
            overflow: hidden;
            touch-action: manipulation;
        }

        #app {
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            height: 100vh;
            height: 100svh;
            min-height: 100vh;
            box-sizing: border-box;
            padding-bottom: var(--bottom-clearance);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-3px); }
            40% { transform: translateX(3px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(1px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        #start-screen h1 {
            font-size: 42px;
            color: #1e293b;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        #start-screen p {
            font-size: 18px;
            color: #64748b;
            margin-bottom: 40px;
            max-width: 400px;
            line-height: 1.5;
        }

        #start-btn {
            background: #2563eb;
            color: white;
            font-size: 20px;
            padding: 16px 40px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.15s, background 0.2s;
        }

        #start-btn:active {
            transform: scale(0.95);
            background: #1d4ed8;
        }

        #canvas {
            background: #fff;
            display: block;
            width: 100%;
            height: 100%;
        }

        #ui {
            padding: 12px 15px;
            text-align: center;
            background: #f1f5f9;
            border-top: 3px solid #cbd5e1;
            box-shadow: 0 -10px 20px rgba(0,0,0,0.08);
            z-index: 10;
            min-height: 180px; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            width: min(100%, 520px);
            justify-self: center;
            padding-bottom: 15px;
        }

        #score {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        #question {
            font-size: 19px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #1e293b;
            min-height: 24px;
        }

        #answers, #reasons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            min-height: var(--choice-area-min-height);
            align-content: center;
        }

        button.game-btn {
            padding: 6px 4px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 10px;
            border: 2px solid #94a3b8;
            cursor: pointer;
            transition: all 0.15s ease;
            -webkit-tap-highlight-color: transparent;
            background: #ffffff;
            color: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 0 #94a3b8;
        }

        button.game-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 0 0 #94a3b8;
        }

        button.game-btn:disabled {
            cursor: default;
        }

        #reasons button.game-btn {
            font-size: 12px;
            line-height: 1.2;
            text-transform: capitalize;
        }

        @media (max-width: 640px) {
            :root {
                --bottom-clearance: max(64px, env(safe-area-inset-bottom, 0px));
                --choice-area-min-height: 100px;
            }

            #ui {
                width: calc(100% - 16px);
                min-height: 0;
                padding: 10px 10px 12px;
            }

            #reasons {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }

            #reasons button.game-btn {
                min-height: 42px;
                font-size: 11px;
                padding: 6px 3px;
            }

            #answers button.game-btn {
                min-height: 42px;
            }
        }

        .correct {
            background: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
            box-shadow: 0 2px 0 #059669 !important;
        }

        .wrong {
            background: #ef4444 !important;
            color: white !important;
            border-color: #b91c1c !important;
            box-shadow: 0 2px 0 #b91c1c !important;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>Angle Game</h1>
    <p>Find the missing angles using parallel lines and intersection rules.</p>
    <button id="start-btn">Start Game</button>
</div>

<div id="app">
    <canvas id="canvas"></canvas>

    <div id="ui" style="display: none;">
        <div id="score">SCORE: 0/0</div>
        <div id="question"></div>
        <div id="answers"></div>
        <div id="reasons" style="display:none"></div>
    </div>
</div>

<script>
    const app = document.getElementById('app');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const answersDiv = document.getElementById('answers');
    const reasonsDiv = document.getElementById('reasons');
    const scoreDiv = document.getElementById('score');
    const qDiv = document.getElementById('question');
    const startScreen = document.getElementById('start-screen');
    const uiDiv = document.getElementById('ui');

    let W, H;
    let geometry = {}; 
    let total = 0, firstCorrect = 0;
    let correctAngle = 0, correctReason = "";
    let firstTry = true;
    let step = 0;
    let stepData = {};
    let audioCtx = null;

    document.getElementById('start-btn').addEventListener('click', () => {
        // Initialize Audio Context on user gesture
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        startScreen.style.display = 'none';
        uiDiv.style.display = 'flex';
        
        // Give the browser a tiny moment to reflow the UI panel before calculating dimensions
        setTimeout(() => {
            resize();
            newRound();
        }, 50);
    });

    function playSound(type) {
        if (!audioCtx) return;
        
        // Resume context if it was suspended (browser policy)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, now); // C5
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.1); // Slide to A5
            gainNode.gain.setValueAtTime(0.5, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        }
    }

    function triggerShake() {
        document.body.classList.remove('shake');
        void document.body.offsetWidth; // Trigger reflow to restart animation
        document.body.classList.add('shake');
    }

    function resize() {
        const appRect = app.getBoundingClientRect();
        W = canvas.width = Math.floor(appRect.width);
        // Fit the drawing area into the remaining app space above the bottom panel
        H = canvas.height = Math.max(0, Math.floor(app.clientHeight - uiDiv.offsetHeight));
        if (geometry && geometry.line1) {
            redraw();
        }
    }

    window.addEventListener('resize', () => {
        if (startScreen.style.display === 'none') {
            resize();
        }
    });

    window.addEventListener('orientationchange', () => {
        if (startScreen.style.display === 'none') {
            resize();
        }
    });

    function rand(a, b) { return Math.random() * (b - a) + a; }
    function randi(a, b) { return Math.floor(rand(a, b + 1)); }

    function lineFromPointAngle(x, y, a, len = 3000) {
        return { 
            x1: x - Math.cos(a) * len, y1: y - Math.sin(a) * len, 
            x2: x + Math.cos(a) * len, y2: y + Math.sin(a) * len 
        }
    }

    function intersect(l1, l2) {
        let { x1, y1, x2, y2 } = l1, { x1: a, y1: b, x2: c, y2: d } = l2;
        let den = (x1 - x2) * (b - d) - (y1 - y2) * (a - c);
        if (den === 0) return null;
        let px = ((x1 * y2 - y1 * x2) * (a - c) - (x1 - x2) * (a * d - b * c)) / den;
        let py = ((x1 * y2 - y1 * x2) * (b - d) - (y1 - y2) * (a * d - b * c)) / den;
        return { x: px, y: py };
    }

    function drawLine(l) {
        ctx.beginPath();
        ctx.moveTo(l.x1, l.y1);
        ctx.lineTo(l.x2, l.y2);
        ctx.stroke();
    }

    function drawParallelMarker(x, y, angle) {
        const size = 6; 
        const spacing = 5; 
        const dx = Math.cos(angle);
        const dy = Math.sin(angle);
        const nx = -dy;
        const ny = dx;

        ctx.lineWidth = 2.5;
        ctx.strokeStyle = "#000";

        for (let offset of [-spacing/2, spacing/2]) {
            const tx = x + dx * offset;
            const ty = y + dy * offset;
            ctx.beginPath();
            ctx.moveTo(tx - dx * size + nx * size, ty - dy * size + ny * size);
            ctx.lineTo(tx, ty);
            ctx.lineTo(tx - dx * size - nx * size, ty - dy * size - ny * size);
            ctx.stroke();
        }
    }

    function drawAngleArc(x, y, a1, a2, label, color = "#e67e22") {
        let r = 40;
        ctx.beginPath();
        ctx.arc(x, y, r, a1, a2, false);
        ctx.strokeStyle = color;
        ctx.lineWidth = 4;
        ctx.stroke();

        let mid = (a1 + a2) / 2;
        let tx = x + Math.cos(mid) * (r + 22);
        let ty = y + Math.sin(mid) * (r + 22);
        ctx.fillStyle = color;
        ctx.font = "bold 18px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, tx, ty);
    }

    function clampIntersectionPoints(i1, i2, margin) {
        if (i1.x < margin || i1.x > W - margin || i2.x < margin || i2.x > W - margin) return false;
        if (i1.y < margin || i1.y > H - margin || i2.y < margin || i2.y > H - margin) return false;
        return true;
    }

    function generateGeometry() {
        let tries = 0;
        let margin = Math.min(W, H) * 0.15;
        while (true) {
            tries++;
            if (tries > 100) margin = 0; 
            if (tries > 200) {
                let cx = W / 2, cy = H / 2;
                return {
                    line1: lineFromPointAngle(cx, cy - 40, 0),
                    line2: lineFromPointAngle(cx, cy + 40, 0),
                    tLine: lineFromPointAngle(cx, cy, Math.PI / 3),
                    i1: {x: cx - 40 / Math.tan(Math.PI / 3), y: cy - 40},
                    i2: {x: cx + 40 / Math.tan(Math.PI / 3), y: cy + 40},
                    angleParallel: 0,
                    tAngle: Math.PI / 3
                };
            }
            let angleParallel = rand(-Math.PI/4, Math.PI/4);
            let sep = Math.min(W, H) * 0.20;
            let cx = W / 2, cy = H / 2;
            let nx = Math.cos(angleParallel + Math.PI / 2);
            let ny = Math.sin(angleParallel + Math.PI / 2);
            let p1_base = { x: cx + nx * sep, y: cy + ny * sep };
            let p2_base = { x: cx - nx * sep, y: cy - ny * sep };
            let line1 = lineFromPointAngle(p1_base.x, p1_base.y, angleParallel);
            let line2 = lineFromPointAngle(p2_base.x, p2_base.y, angleParallel);
            let diff = rand(45 * Math.PI / 180, 135 * Math.PI / 180);
            let tAngle = angleParallel + diff;
            let tLine = lineFromPointAngle(cx, cy, tAngle);
            let i1 = intersect(line1, tLine);
            let i2 = intersect(line2, tLine);
            if (!i1 || !i2) continue;
            if (!clampIntersectionPoints(i1, i2, margin)) continue;
            return { line1, line2, tLine, i1, i2, angleParallel, tAngle };
        }
    }

    function angleDirs(ptIndex) {
        let a1 = geometry.angleParallel;
        let a2 = geometry.tAngle; 
        let set = [
            [a1, a2], 
            [a2, a1 + Math.PI], 
            [a1 + Math.PI, a2 + Math.PI], 
            [a2 + Math.PI, a1 + 2 * Math.PI]
        ];
        return set[ptIndex % 4];
    }

    function computeRealAngles() {
        let diff = geometry.tAngle - geometry.angleParallel;
        let base = Math.round(diff * 180 / Math.PI);
        let angles = new Array(8);
        for (let i = 0; i < 8; i++) {
            angles[i] = (i % 2 === 0) ? base : 180 - base;
        }
        return angles;
    }

    function redraw() {
        if (!geometry || !geometry.line1) return;
        ctx.clearRect(0, 0, W, H);
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        drawLine(geometry.line1);
        drawLine(geometry.line2);
        drawLine(geometry.tLine);
        const markerDist = 80; 
        const dx = Math.cos(geometry.angleParallel);
        const dy = Math.sin(geometry.angleParallel);
        drawParallelMarker(geometry.i1.x + dx * markerDist, geometry.i1.y + dy * markerDist, geometry.angleParallel);
        drawParallelMarker(geometry.i2.x + dx * markerDist, geometry.i2.y + dy * markerDist, geometry.angleParallel);
    }

    function newRound() {
        answersDiv.innerHTML = "";
        reasonsDiv.innerHTML = "";
        reasonsDiv.style.display = "none";
        answersDiv.style.display = "grid";
        qDiv.textContent = "";
        firstTry = true;
        step = 0;

        geometry = generateGeometry();
        redraw();

        let angles = computeRealAngles();
        let special = Math.random() < 0.25;

        if (special) {
            let given = randi(0, 7);
            let corresponding = (given < 4) ? given + 4 : given - 4;
            let final = (corresponding % 2 === 0) ? corresponding + 1 : corresponding - 1;
            stepData = { given, corresponding, final, angles };

            let pt = (given < 4) ? geometry.i1 : geometry.i2;
            let [a1, a2] = angleDirs(given);
            drawAngleArc(pt.x, pt.y, a1, a2, angles[given] + "°", "#000");

            let pt2 = (corresponding < 4) ? geometry.i1 : geometry.i2;
            let [b1, b2] = angleDirs(corresponding);
            drawAngleArc(pt2.x, pt2.y, b1, b2, "x", "#2980b9"); // Blue X

            let pt3 = (final < 4) ? geometry.i1 : geometry.i2;
            let [c1, c2] = angleDirs(final);
            drawAngleArc(pt3.x, pt3.y, c1, c2, "y", "#e67e22");

            correctAngle = angles[corresponding];
            correctReason = "corresponding";
            
            showAnswers("x", "#2980b9"); // Ask for x matching blue color
        } else {
            let relations = ["opposite", "corresponding", "alternate", "co-interior", "co-exterior", "angles on a straight line"];
            correctReason = relations[randi(0, relations.length - 1)];
            let validPairs = {
                "opposite": [[0,2], [1,3], [4,6], [5,7]],
                "corresponding": [[0,4], [1,5], [2,6], [3,7]],
                "alternate": [[0,6], [1,7], [2,4], [3,5]],
                "co-interior": [[2,5], [3,4], [5,2], [4,3]],
                "co-exterior": [[0,7], [1,6], [7,0], [6,1]],
                "angles on a straight line": [[0,1], [1,2], [2,3], [3,0], [4,5], [5,6], [6,7], [7,4]]
            };
            let pairs = validPairs[correctReason];
            let pair = pairs[randi(0, pairs.length - 1)];
            let given, target;
            if (Math.random() > 0.5) { given = pair[0]; target = pair[1]; }
            else { given = pair[1]; target = pair[0]; }
            stepData = { given, target, angles };

            let pt = (given < 4) ? geometry.i1 : geometry.i2;
            let [a1, a2] = angleDirs(given);
            drawAngleArc(pt.x, pt.y, a1, a2, angles[given] + "°", "#000");

            let pt2 = (target < 4) ? geometry.i1 : geometry.i2;
            let [b1, b2] = angleDirs(target);
            drawAngleArc(pt2.x, pt2.y, b1, b2, "x", "#e67e22"); // Orange X
            correctAngle = angles[target];
            
            showAnswers("x", "#e67e22"); // Ask for x matching orange color
        }
    }

    function showAnswers(varName = "x", varColor = "#e67e22") {
        answersDiv.innerHTML = "";
        qDiv.innerHTML = `What is angle <span style="color: ${varColor}">${varName}</span>?`;
        
        let wrong = 180 - correctAngle;
        let opts = [correctAngle, wrong];
        if (correctAngle === 90) opts = [90, 80, 100];
        opts = [...new Set(opts)].sort(() => Math.random() - 0.5);

        opts.forEach(v => {
            let b = document.createElement('button');
            b.className = 'game-btn';
            b.textContent = v + "°";
            b.onclick = () => pickAnswer(b, v);
            answersDiv.appendChild(b);
        });
    }

    function pickAnswer(btn, val) {
        if (val === correctAngle) {
            playSound('correct');
            btn.classList.add('correct');
            // Disable all buttons in answers section
            Array.from(answersDiv.children).forEach(b => b.disabled = true);
            
            if (firstTry) firstCorrect++;
            total++;
            updateScore();
            setTimeout(showReasons, 600);
        } else {
            playSound('wrong');
            triggerShake();
            btn.classList.add('wrong');
            btn.disabled = true;
            firstTry = false;
        }
    }

    function updateScore() {
        scoreDiv.textContent = "SCORE: " + firstCorrect + "/" + total;
    }

    function showReasons() {
        answersDiv.style.display = "none";
        qDiv.textContent = "Why?";
        reasonsDiv.style.display = "grid";
        reasonsDiv.innerHTML = "";
        let reasons = ["opposite", "corresponding", "alternate", "co-interior", "co-exterior", "angles on a straight line"];
        reasons.forEach(r => {
            let b = document.createElement('button');
            b.className = 'game-btn';
            b.textContent = r;
            b.onclick = () => pickReason(b, r);
            reasonsDiv.appendChild(b);
        });
    }

    function pickReason(btn, r) {
        if (r === correctReason) {
            playSound('correct');
            btn.classList.add('correct');
            // Disable all buttons in reasons section
            Array.from(reasonsDiv.children).forEach(b => b.disabled = true);

            if (stepData.corresponding !== undefined && step === 0) {
                step = 1;
                setTimeout(secondStep, 800);
            } else {
                setTimeout(newRound, 800);
            }
        } else {
            playSound('wrong');
            triggerShake();
            btn.classList.add('wrong');
            btn.disabled = true;
        }
    }

    function secondStep() {
        reasonsDiv.style.display = "none";
        answersDiv.style.display = "grid";
        firstTry = true;
        let g = stepData.given, c = stepData.corresponding, f = stepData.final, angles = stepData.angles;
        redraw();
        let pt0 = (g < 4) ? geometry.i1 : geometry.i2;
        drawAngleArc(pt0.x, pt0.y, ...angleDirs(g), angles[g] + "°", "#000");
        let pt = (c < 4) ? geometry.i1 : geometry.i2;
        drawAngleArc(pt.x, pt.y, ...angleDirs(c), angles[c] + "°", "#2980b9");
        let pt2 = (f < 4) ? geometry.i1 : geometry.i2;
        drawAngleArc(pt2.x, pt2.y, ...angleDirs(f), "y", "#e67e22"); // Orange Y
        
        correctAngle = angles[f];
        correctReason = "angles on a straight line";
        showAnswers("y", "#e67e22");
    }

</script>
</body>
</html>
